services:
  backend:
    build: ./backend
    ports:
      - "5112:5112"
    volumes:
      - sqlite-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite-data:
